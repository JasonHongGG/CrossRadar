<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CrossRadar Crossing Watch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar panel-shell">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 48 48" fill="none">
              <rect x="4" y="4" width="40" height="40" rx="14" />
              <path d="M15 32L24 16L33 32" />
              <path d="M15 21H33" />
              <circle cx="24" cy="24" r="4.5" />
            </svg>
          </span>
          <div class="brand-copy">
            <strong>CrossRadar</strong>
            <span>crossing watch</span>
          </div>
        </div>

        <form id="regionForm" class="search-shell" autocomplete="off">
          <label class="sr-only" for="regionInput">輸入地區或平交道名稱</label>
          <input
            id="regionInput"
            class="search-input"
            list="regionSuggestions"
            type="text"
            placeholder="輸入縣市、鄉鎮、車站或平交道名稱"
          />
          <datalist id="regionSuggestions"></datalist>
          <button id="focusRegionButton" class="primary-button" type="submit">聚焦地區</button>
          <button id="resetRegionButton" class="ghost-button" type="button">全部顯示</button>
        </form>

        <div class="metric-strip">
          <article class="metric-pill">
            <span id="mappedMetric">0</span>
            <small>已整合平交道</small>
          </article>
          <article class="metric-pill metric-pill-soft">
            <span id="filteredMetric">0</span>
            <small>目前地區</small>
          </article>
          <article class="metric-pill metric-pill-alert">
            <span id="warningMetric">0</span>
            <small>即將通過</small>
          </article>
        </div>
      </header>

      <main class="experience-grid">
        <aside class="results-panel panel-shell">
          <div class="section-head">
            <div>
              <p class="section-kicker">地區結果</p>
              <h1>可選平交道</h1>
            </div>
            <button id="focusSelectionButton" class="ghost-button" type="button">定位目標</button>
          </div>
          <p id="filterSummary" class="panel-copy">輸入地區後，地圖會聚焦到對應範圍。</p>
          <div id="resultsList" class="results-list"></div>
        </aside>

        <section class="map-panel panel-shell">
          <div class="map-overlay overlay-top">
            <div id="selectionBadge" class="selection-badge"></div>
          </div>
          <div class="map-overlay overlay-bottom">
            <div class="legend-strip">
              <span class="legend-chip"><i class="legend-dot legend-dot-crossing"></i><b>crossing</b></span>
              <span class="legend-chip"><i class="legend-dot legend-dot-selected"></i><b>selected</b></span>
              <span class="legend-chip"><i class="legend-dot legend-dot-station"></i><b>stations</b></span>
            </div>
          </div>
          <div id="map"></div>
        </section>

        <aside class="insights-panel panel-shell">
          <section id="selectedCrossingCard" class="insight-card"></section>
          <section id="warningCard" class="insight-card warning-card"></section>
          <section class="insight-card prediction-shell">
            <div class="section-head compact">
              <div>
                <p class="section-kicker">即時提醒</p>
                <h2>列車通過預估</h2>
              </div>
              <button id="refreshSelectionButton" class="ghost-button" type="button">更新預測</button>
            </div>
            <div id="predictionList" class="prediction-list"></div>
          </section>
          <div id="statusBar" class="status-bar">載入中…</div>
        </aside>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/app.js"></script>
  </body>
</html>
