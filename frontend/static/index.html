<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CrossRadar Crossing Watch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar panel-shell">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 48 48" fill="none">
              <rect x="4" y="4" width="40" height="40" rx="14" />
              <path d="M14 31L24 15L34 31" />
              <path d="M16 21H32" />
              <circle cx="24" cy="24" r="4.5" />
            </svg>
          </span>
          <div class="brand-copy">
            <strong>CrossRadar</strong>
            <span>crossing watch</span>
          </div>
        </div>

        <form id="regionForm" class="search-rail" autocomplete="off">
          <div id="searchStack" class="search-stack">
            <label class="sr-only" for="regionInput">搜尋地區、車站或平交道</label>
            <div class="search-box">
              <span class="search-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <circle cx="11" cy="11" r="6" />
                  <path d="M20 20L16.65 16.65" />
                </svg>
              </span>
              <input
                id="regionInput"
                class="search-input"
                type="text"
                placeholder="搜尋縣市、車站、平交道"
              />
              <button id="searchMenuButton" class="search-toggle" type="button" aria-haspopup="listbox" aria-expanded="false">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M6 9L12 15L18 9" />
                </svg>
              </button>
            </div>
            <div id="searchPanel" class="search-panel" hidden></div>
          </div>
          <button id="focusRegionButton" class="primary-button" type="button">聚焦地區</button>
          <button id="resetRegionButton" class="ghost-button" type="button">全台</button>
        </form>

        <div class="metric-strip">
          <article class="metric-pill">
            <span id="mappedMetric">0</span>
            <small>已整合平交道</small>
          </article>
          <article class="metric-pill metric-pill-soft">
            <span id="filteredMetric">0</span>
            <small>目前範圍</small>
          </article>
          <article class="metric-pill metric-pill-alert">
            <span id="warningMetric">0</span>
            <small>提醒中</small>
          </article>
        </div>
      </header>

      <main class="experience-grid">
        <aside class="results-panel panel-shell">
          <div class="results-head">
            <div class="scope-stack">
              <span id="scopeLabel" class="scope-label">全台</span>
              <div class="scope-count-row">
                <strong id="resultsCount">0</strong>
                <span>平交道</span>
              </div>
            </div>
            <button id="focusSelectionButton" class="ghost-button inline-button" type="button">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M4 9V4H9" />
                <path d="M15 4H20V9" />
                <path d="M20 15V20H15" />
                <path d="M9 20H4V15" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <span>定位</span>
            </button>
          </div>
          <div id="resultsList" class="results-list"></div>
        </aside>

        <section class="map-panel panel-shell">
          <div class="map-overlay overlay-top">
            <div id="selectionBadge" class="selection-badge"></div>
          </div>
          <div class="map-overlay overlay-bottom">
            <div class="legend-strip">
              <span class="legend-chip"><i class="legend-dot legend-dot-crossing"></i><b>crossing</b></span>
              <span class="legend-chip"><i class="legend-dot legend-dot-selected"></i><b>selected</b></span>
              <span class="legend-chip"><i class="legend-dot legend-dot-station"></i><b>stations</b></span>
            </div>
          </div>
          <div id="map"></div>
        </section>

        <aside class="insights-panel panel-shell">
          <section id="selectedCrossingCard" class="display-card crossing-card"></section>
          <section id="warningCard" class="display-card hero-card"></section>
          <section class="display-card schedule-card">
            <div class="schedule-head">
              <span class="schedule-title">列車通過</span>
              <button id="refreshSelectionButton" class="ghost-button inline-button compact" type="button">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M20 11A8 8 0 0 0 6.3 6.3" />
                  <path d="M4 4V9H9" />
                  <path d="M4 13A8 8 0 0 0 17.7 17.7" />
                  <path d="M20 20V15H15" />
                </svg>
                <span>更新</span>
              </button>
            </div>
            <div id="predictionList" class="prediction-list"></div>
            <div id="statusBar" class="status-bar">載入中…</div>
          </section>
        </aside>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/app.js"></script>
  </body>
</html>
